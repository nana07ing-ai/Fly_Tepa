<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Летающий Тёпа</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="shortcut icon" href="./img/tepa.ico" type="image/x-icon">
</head>
<body>
    <div class="monitor">
        <img src="./img/tepa_raketa.png" alt="Тёпа" id="tepa">
        <div class="up_wall tryba"></div>
        <img src="./img/pelmen.png" alt="Пельмень" id="pelmen">
        <div class="down_wall tryba"></div>
    </div>
    <div class="game_play">
        <button id="play_btn">Старт</button>
        <h2 id="score">Съедено Пельменей: 0</h2>
        <button id="sound_btn">🔊</button>
    </div>
    <script src="./js/js.js"></script>
</body>
</html>
